spring.application.name=MySawit-Manajemen_Kebun_Sawit

# JWT Configuration (for testing)
jwt.secret=testSecretForTesting12345678901234567890
jwt.expirationMs=600000
jwt.refreshExpirationMs=604800000

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
