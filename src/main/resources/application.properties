spring.application.name=MySawit-Manajemen_Kebun_Sawit

# Default values for local development (H2 for testing only)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET:defaultTestSecret12345678901234567890}
jwt.expirationMs=600000
jwt.refreshExpirationMs=604800000