server:
  port: 8082

grpc:
  server:
    enabled: ${GRPC_SERVER_ENABLED:true}
    port: ${GRPC_PORT:9092}

internal:
  grpc:
    auth:
      enabled: ${AUTH_GRPC_ENABLED:true}
      host: ${AUTH_GRPC_HOST:localhost}
      port: ${AUTH_GRPC_PORT:9091}

spring:
  profiles:
    active: local
  config:
    import: optional:file:.env[.properties]

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true